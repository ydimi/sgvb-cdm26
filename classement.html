    for(let k=0;k<MATCHES.length-1;k++){
      const a=MATCHES[k], b=MATCHES[k+1];
      const seg=el("line",{x1:x(a.m),y1:y(s.cum[k]),x2:x(b.m),y2:y(s.cum[k+1]),
        class:"series-line", stroke:s.color, "stroke-width":2.5, opacity:.9});
      if(b.m-a.m>1) seg.setAttribute("stroke-dasharray","6 5");
      chart.appendChild(seg);
    }
    MATCHES.forEach((o,k)=> chart.appendChild(el("circle",{cx:x(o.m),cy:y(s.cum[k]),r:4,fill:s.color,class:"pt"})));
  });
  // labels de fin avec anti-chevauchement : on empile par y croissant avec un
  // ecart minimum, puis on recentre dans la zone ; un trait relie point -> label.
  const last=MATCHES.length-1;
  const lab=vis.map(s=>({s,y0:y(s.cum[last]),y:y(s.cum[last])})).sort((a,b)=>a.y-b.y);
  const gap=12.5;
  for(let i=1;i<lab.length;i++) if(lab[i].y<lab[i-1].y+gap) lab[i].y=lab[i-1].y+gap;
  if(lab.length){
    const over=lab[lab.length-1].y-(M.t+plotH); if(over>0) lab.forEach(l=>l.y-=over);
    const topOver=M.t-lab[0].y; if(topOver>0) lab.forEach(l=>l.y+=topOver);
  }
  const xr=x(MATCHES[last].m);
  lab.forEach(l=>{
    chart.appendChild(el("line",{x1:xr+4,y1:l.y0,x2:xr+11,y2:l.y,stroke:l.s.color,"stroke-width":1,opacity:.55}));
    const e=el("text",{x:xr+13,y:l.y+3,"text-anchor":"start","font-size":10});
    e.setAttribute("fill",l.s.color);
    e.textContent=l.s.rank+" - "+l.s.name+" ("+l.s.cum[last]+")"; chart.appendChild(e);
  });
}
function overlay(){
  MATCHES.forEach((o,k)=>{ const half=plotW/(MMAX-MMIN||1)/1.6;
    const r=el("rect",{x:x(o.m)-half,y:M.t,width:half*2,height:plotH,fill:"transparent"});
    r.addEventListener("mousemove",e=>showTip(e,k,o));
    r.addEventListener("mouseleave",()=>tip.style.opacity=0);
    chart.appendChild(r); });
}
function showTip(e,k,o){
  const rows=SERIES.filter(s=>!hidden.has(s.name)).sort((a,b)=>b.cum[k]-a.cum[k])
    .map(s=>'<div class="tr"><span><span class="dot" style="background:'+s.color+'"></span>'+s.name+'</span><b>'+s.cum[k]+'</b></div>').join("");
  tip.innerHTML='<div class="th">Match '+o.m+' — '+o.date+(o.unit?" ("+o.lbl+")":" (jalon)")+'</div>'+rows;
  tip.style.opacity=1;
  let tx=e.clientX+14; if(tx+190>window.innerWidth) tx=e.clientX-204;
  tip.style.left=tx+"px"; tip.style.top=(e.clientY+14)+"px";
}
function legend(){
  const box=document.getElementById("legend"); box.innerHTML="";
  SERIES.forEach(s=>{ const b=document.createElement("div");
    b.className="lg"+(hidden.has(s.name)?" off":"");
    b.innerHTML='<span class="dot" style="background:'+s.color+'"></span>'+s.name;
    b.onclick=()=>{ hidden.has(s.name)?hidden.delete(s.name):hidden.add(s.name); b.classList.toggle("off"); draw(); overlay(); };
    box.appendChild(b); });
}
function el(t,a){const e=document.createElementNS(SVG,t);for(const k in a)e.setAttribute(k,a[k]);return e;}
function line(x1,y1,x2,y2,c){chart.appendChild(el("line",{x1,y1,x2,y2,class:c}));}
function txt(xx,yy,t,anchor,fill,weight){const e=el("text",{x:xx,y:yy,"text-anchor":anchor||"start"});
  if(fill)e.setAttribute("fill",fill); if(weight)e.setAttribute("font-weight",weight); e.textContent=t; chart.appendChild(e);}
load(current);
</script>

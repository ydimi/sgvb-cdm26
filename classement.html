it":true},{"m":20,"lbl":"Autriche-Jordanie","date":"17/06","unit":true},{"m":21,"lbl":"Portugal-RD Congo","date":"17/06","unit":true},{"m":22,"lbl":"Angleterre-Croatie","date":"17/06","unit":true},{"m":23,"lbl":"Ghana-Panama","date":"18/06","unit":true},{"m":24,"lbl":"Ouzbékistan-Colombie","date":"18/06","unit":true},{"m":25,"lbl":"Tchéquie-Afrique du Sud","date":"18/06","unit":true},{"m":26,"lbl":"Suisse-Bosnie","date":"18/06","unit":true},{"m":27,"lbl":"Canada-Qatar","date":"19/06","unit":true},{"m":28,"lbl":"Mexique-Corée du Sud","date":"19/06","unit":true}],"SERIES":[{"name":"DADA3498","color":"#2a9d8f","cum":[69,69,206,280,280,402,446,446,461,461,569,641,641,641,641,757,833,863,906,906,906,965,1038,1082,1082,1158,1229,1229],"rank":1},{"name":"YozLePirate","color":"#e76f51","cum":[69,69,206,280,280,422,422,422,437,437,545,545,545,545,545,545,591,621,621,659,659,718,718,762,762,838,909,909],"rank":2},{"name":"Bazooz","color":"#5aa9e6","cum":[69,69,69,143,143,143,187,187,202,202,202,274,274,274,274,390,466,496,496,534,534,593,666,666,666,742,813,813],"rank":3},{"name":"Douillard_aymeri","color":"#b07cd6","cum":[49,49,49,123,123,367,411,411,426,426,426,426,426,426,426,426,472,502,502,502,502,502,575,619,619,695,695,764],"rank":4},{"name":"Flomar1502","color":"#f4b400","cum":[49,49,49,123,123,123,167,167,182,182,182,254,254,254,254,254,300,330,373,373,373,373,466,510,510,510,510,510],"rank":5}]}};
const LEAGUES = ["SGVB","CSE OCEASOFT/DICKSON"];
let current = LEAGUES[0];
let MATCHES = [], SERIES = [];

const SVG="http://www.w3.org/2000/svg";
const W=980,H=470, M={t:22,r:178,b:56,l:54};
const plotW=W-M.l-M.r, plotH=H-M.t-M.b;
let MMIN=1, MMAX=20, maxY=1000;
const hidden=new Set();
const chart=document.getElementById("chart");
const tip=document.getElementById("tip");
const x=mi=> M.l + plotW*((mi-MMIN)/(MMAX-MMIN||1));
const y=v=> M.t + plotH - plotH*(v/maxY);

function load(name){
  current=name; hidden.clear();
  MATCHES=DATA[name].MATCHES; SERIES=DATA[name].SERIES;
  MMIN=1; MMAX=MATCHES.length||1;
  maxY=Math.max(100, Math.ceil(Math.max(...SERIES.flatMap(s=>s.cum),0)/100)*100);
  switchUI(); legend(); draw(); overlay();
}
function switchUI(){
  const box=document.getElementById("switch"); box.innerHTML="";
  LEAGUES.forEach(n=>{ const b=document.createElement("button");
    b.textContent=n; if(n===current)b.className="on"; b.onclick=()=>load(n); box.appendChild(b); });
}
function draw(){
  chart.innerHTML="";
  for(let v=0; v<=maxY; v+=100){ line(M.l,y(v),W-M.r,y(v),v===0?"axis-line":"grid-line"); txt(M.l-8,y(v)+4,v,"end"); }
  let lastDate=null;
  MATCHES.forEach(o=>{ line(x(o.m),M.t+plotH,x(o.m),M.t+plotH+6,"axis-line");
    txt(x(o.m),M.t+plotH+18,o.m,"middle","#c9d1d9");
    if(o.date!==lastDate){ txt(x(o.m),M.t+plotH+34,o.date,"middle","#6b7280"); lastDate=o.date; } });
  const vis=SERIES.filter(s=>!hidden.has(s.name));
  // courbes + points
  vis.forEach(s=>{
    for(let k=0;k<MATCHES.length-1;k++){
      const a=MATCHES[k], b=MATCHES[k+1];
      const seg=el("line",{x1:x(a.m),y1:y(s.cum[k]),x2:x(b.m),y2:y(s.cum[k+1]),
        class:"series-line", stroke:s.color, "stroke-width":2.5, opacity:.9});
      if(b.m-a.m>1) seg.setAttribute("stroke-dasharray","6 5");
      chart.appendChild(seg);
    }
    MATCHES.forEach((o,k)=> chart.appendChild(el("circle",{cx:x(o.m),cy:y(s.cum[k]),r:4,fill:s.color,class:"pt"})));
  });
  // labels de fin avec anti-chevauchement : on empile par y croissant avec un
  // ecart minimum, puis on recentre dans la zone ; un trait relie point -> label.
  const last=MATCHES.length-1;
  const lab=vis.map(s=>({s,y0:y(s.cum[last]),y:y(s.cum[last])})).sort((a,b)=>a.y-b.y);
  const gap=12.5;
  for(let i=1;i<lab.length;i++) if(lab[i].y<lab[i-1].y+gap) lab[i].y=lab[i-1].y+gap;
  if(lab.length){
    const over=lab[lab.length-1].y-(M.t+plotH); if(over>0) lab.forEach(l=>l.y-=over);
    const topOver=M.t-lab[0].y; if(topOver>0) lab.forEach(l=>l.y+=topOver);
  }
  const xr=x(MATCHES[last].m);
  lab.forEach(l=>{
    chart.appendChild(el("line",{x1:xr+4,y1:l.y0,x2:xr+11,y2:l.y,stroke:l.s.color,"stroke-width":1,opacity:.55}));
    const e=el("text",{x:xr+13,y:l.y+3,"text-anchor":"start","font-size":10});
    e.setAttribute("fill",l.s.color);
    e.textContent=l.s.rank+" - "+l.s.name+" ("+l.s.cum[last]+")"; chart.appendChild(e);
  });
}
function overlay(){
  MATCHES.forEach((o,k)=>{ const half=plotW/(MMAX-MMIN||1)/1.6;
    const r=el("rect",{x:x(o.m)-half,y:M.t,width:half*2,height:plotH,fill:"transparent"});
    r.addEventListener("mousemove",e=>showTip(e,k,o));
    r.addEventListener("mouseleave",()=>tip.style.opacity=0);
    chart.appendChild(r); });
}
function showTip(e,k,o){
  const rows=SERIES.filter(s=>!hidden.has(s.name)).sort((a,b)=>b.cum[k]-a.cum[k])
    .map(s=>'<div class="tr"><span><span class="dot" style="background:'+s.color+'"></span>'+s.name+'</span><b>'+s.cum[k]+'</b></div>').join("");
  tip.innerHTML='<div class="th">Match '+o.m+' — '+o.date+(o.unit?" ("+o.lbl+")":" (jalon)")+'</div>'+rows;
  tip.style.opacity=1;
  let tx=e.clientX+14; if(tx+190>window.innerWidth) tx=e.clientX-204;
  tip.style.left=tx+"px"; tip.style.top=(e.clientY+14)+"px";
}
function legend(){
  const box=document.getElementById("legend"); box.innerHTML="";
  SERIES.forEach(s=>{ const b=document.createElement("div");
    b.className="lg"+(hidden.has(s.name)?" off":"");
    b.innerHTML='<span class="dot" style="background:'+s.color+'"></span>'+s.name;
    b.onclick=()=>{ hidden.has(s.name)?hidden.delete(s.name):hidden.add(s.name); b.classList.toggle("off"); draw(); overlay(); };
    box.appendChild(b); });
}
function el(t,a){const e=document.createElementNS(SVG,t);for(const k in a)e.setAttribute(k,a[k]);return e;}
function line(x1,y1,x2,y2,c){chart.appendChild(el("line",{x1,y1,x2,y2,class:c}));}
function txt(xx,yy,t,anchor,fill,weight){const e=el("text",{x:xx,y:yy,"text-anchor":anchor||"start"});
  if(fill)e.setAttribute("fill",fill); if(weight)e.setAttribute("font-weight",weight); e.textContent=t; chart.appendChild(e);}
load(current);
</script>

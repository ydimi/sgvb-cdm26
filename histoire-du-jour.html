<style>
  :root{--bg:#0e1116;--panel:#161b22;--grid:#2a313c;--text:#e6edf3;--muted:#8b949e;--me:#f4b400}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:860px;margin:0 auto;padding:24px 18px 64px}
  h1{font-size:21px;margin:0 0 14px}
  .nav{display:flex;align-items:center;justify-content:center;gap:14px;margin:0 0 18px}
  .nav button{background:var(--panel);color:var(--text);border:1px solid var(--grid);border-radius:10px;width:44px;height:44px;font-size:20px;cursor:pointer;line-height:1;transition:background .15s}
  .nav button:hover:not(:disabled){background:#1f6feb;border-color:#1f6feb}
  .nav button:disabled{opacity:.3;cursor:default}
  .nav .day{min-width:230px;text-align:center}
  .nav .day .d{font-size:18px;font-weight:600}
  .nav .day .c{font-size:12px;color:var(--muted)}
  .card{background:var(--panel);border:1px solid var(--grid);border-radius:12px;padding:16px 18px;margin:0 0 16px}
  .card h2{font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 12px}
  .story p{margin:0 0 11px;line-height:1.62;font-size:15px}
  .story p:last-child{margin:0}
  .tablewrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--grid);vertical-align:middle}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
  th.pl{text-align:center;font-weight:700}
  tr:last-child td{border-bottom:0}
  .sc{font-variant-numeric:tabular-nums;font-weight:600;white-space:nowrap}
  td.match{white-space:nowrap}
  td.pc{text-align:center;white-space:nowrap}
  td.pc .cd{font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:3px}
  .tag{display:inline-block;padding:2px 7px;border-radius:999px;font-size:10.5px;font-weight:700;color:#0e1116}
  .x2{display:inline-block;margin-left:4px;padding:1px 5px;border-radius:999px;font-size:10px;font-weight:800;vertical-align:middle}

  .x2.ko{background:rgba(231,111,81,.18);color:#e76f51}
  .dash{color:var(--muted)}
  .leg{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px;font-size:11px;color:var(--muted);align-items:center}

  .bars .nm{width:128px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bars .track{flex:1;background:#0e1116;border-radius:6px;height:20px;position:relative;overflow:hidden}
  .bars .fill{height:100%;border-radius:6px;min-width:2px}
  .bars .val{width:42px;text-align:right;font-variant-numeric:tabular-nums;font-size:13px}
  .bars .nm{font-weight:600}
  .star{color:var(--me)}
  .empty{color:var(--muted);font-style:italic}
</style>
</head>

const ME="YozLePirate";

const STCOLOR={"EXACT":"#43aa8b","BON":"#5aa9e6","RATE":"#e76f51","-":"#8b949e"};
let i=DAYS.length-1;
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function render(){

    document.getElementById('dlabel').textContent='—';return;}

  document.getElementById('prev').disabled=(i<=0);

      return '<td class="pc">'+pill+x2+'<div class="cd">'+c.pred+' &middot; '+c.pts+'</div></td>';
    }).join('');
    return '<tr><td>'+m.h+'</td><td class="match">'+esc(m.home)+' <span class="sc">'+m.sh+'-'+m.sa+'</span> '+esc(m.away)+'</td>'+tds+'</tr>';
  }).join('');
  document.getElementById('fil').innerHTML='<div class="tablewrap"><table><thead>'+head+'</thead><tbody>'+rows+'</tbody></table></div>'

  }).join('');
}
